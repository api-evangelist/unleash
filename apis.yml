- aid: unleash:client-api
  name: Unleash Client API
  description: API endpoint consumed by backend Unleash SDKs to fetch complete feature flag configurations including all activation
    strategies. Supports server-side flag evaluation with zero additional latency after initial bootstrap. Requires a backend
    API token scoped to a project and environment.
  humanURL: https://docs.getunleash.io/api#client-api
  baseURL: https://app.unleash-instance.example.com
  tags:
  - Client
  - SDK
  - Feature Flags
