  - type: NaftikoCapability
    url: capabilities/client-client.yaml
- aid: unleash:frontend-api
  name: Unleash Frontend API
  description: API endpoint consumed by frontend/client-side SDKs. Returns only the evaluated state (enabled/disabled) of
    feature flags for a given Unleash Context, without exposing strategy configuration. Safe for use in browser and mobile
    apps.
  humanURL: https://docs.getunleash.io/api#frontend-api
  baseURL: https://app.unleash-instance.example.com
