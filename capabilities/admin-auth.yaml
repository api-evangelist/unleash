    - name: changes-user-password
      description: Changes a User Password
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-auth.changepassword
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: reset-password
      description: Reset Password
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-auth.sendresetpasswordemail
      with:
        body: tools.body
      outputParameters:
      - type: object
