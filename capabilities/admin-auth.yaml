    - name: validates-token
      description: Validates a Token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-auth.validatetoken
      outputParameters:
      - type: object
        mapping: $.
    - name: validates-password
      description: Validates Password
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: admin-auth.validatepassword
      with:
        body: tools.body
      outputParameters:
