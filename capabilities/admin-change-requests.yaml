naftiko: 1.0.0-alpha2
info:
  label: Unleash Admin API — Change Requests
  description: 'Unleash Admin API — Change Requests. 20 operations. Lead operation: Retrieves All Change Requests for a Project.
    Self-contained Naftiko capability covering one Unleash business surface.'
  tags:
  - Unleash
  - Change Requests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
