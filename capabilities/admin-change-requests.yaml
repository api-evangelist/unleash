      path: /api/admin/projects/{projectId}/change-requests
      operations:
      - name: getchangerequestsforproject
        method: GET
        description: Retrieves All Change Requests for a Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
