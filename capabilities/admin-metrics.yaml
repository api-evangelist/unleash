      operations:
      - method: GET
        name: getcustommetrics
        description: Get Stored Custom Metrics
        call: admin-metrics.getcustommetrics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/admin/custom-metrics/prometheus
