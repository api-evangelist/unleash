naftiko: 1.0.0-alpha2
info:
  label: Unleash Admin API — Telemetry
  description: 'Unleash Admin API — Telemetry. 1 operations. Lead operation: Get Telemetry Settings. Self-contained Naftiko
    capability covering one Unleash business surface.'
  tags:
  - Unleash
  - Telemetry
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNLEASH_API_KEY: UNLEASH_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-telemetry
    baseUri: https://app.unleash-instance.example.com
    description: Unleash Admin API — Telemetry business capability. Self-contained, no shared references.
    resources:
    - name: api-admin-telemetry-settings
      path: /api/admin/telemetry/settings
      operations:
      - name: gettelemetrysettings
        method: GET
        description: Get Telemetry Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.UNLEASH_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-telemetry-rest
    port: 8080
    description: REST adapter for Unleash Admin API — Telemetry. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/admin/telemetry/settings
      name: api-admin-telemetry-settings
      description: REST surface for api-admin-telemetry-settings.
      operations:
      - method: GET
        name: gettelemetrysettings
        description: Get Telemetry Settings
        call: admin-telemetry.gettelemetrysettings
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-telemetry-mcp
    port: 9090
    transport: http
    description: MCP adapter for Unleash Admin API — Telemetry. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-telemetry-settings
      description: Get Telemetry Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-telemetry.gettelemetrysettings
      outputParameters:
      - type: object
        mapping: $.
