naftiko: "1.0.0-alpha1"

info:
  label: Unleash Admin API
  description: >-
    Unleash Admin API providing comprehensive programmatic control over feature flags,
    projects, environments, users, API tokens, strategies, segments, and integrations.
    Powers the Unleash Admin UI and enables automation workflows.
  tags:
    - Unleash
    - Feature Flags
    - Admin
    - Feature Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNLEASH_API_TOKEN: UNLEASH_API_TOKEN
      UNLEASH_BASE_URL: UNLEASH_BASE_URL

capability:
  consumes:
    - type: http
      namespace: unleash-admin
      baseUri: "{{UNLEASH_BASE_URL}}"
      description: Unleash Admin API for feature flag management
      authentication:
        type: apikey
        key: Authorization
        value: "{{UNLEASH_API_TOKEN}}"
        placement: header

      resources:
        - name: features
          path: /api/admin/projects
          description: Feature flag management scoped to projects
          operations:
            - name: list-features
              method: GET
              description: List All Feature Flags
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: Project identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-feature
              method: POST
              description: Create Feature Flag
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: Project identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  type: "{{tools.type}}"

            - name: get-feature
              method: GET
              description: Get Feature Flag
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: Project identifier
                - name: featureName
                  in: path
                  type: string
                  required: true
                  description: Feature flag name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: enable-feature
              method: POST
              description: Enable Feature Flag
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: Project identifier
                - name: featureName
                  in: path
                  type: string
                  required: true
                  description: Feature flag name
                - name: environment
                  in: path
                  type: string
                  required: true
                  description: Environment name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: disable-feature
              method: POST
              description: Disable Feature Flag
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                  description: Project identifier
                - name: featureName
                  in: path
                  type: string
                  required: true
                  description: Feature flag name
                - name: environment
                  in: path
                  type: string
                  required: true
                  description: Environment name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: projects
          path: /api/admin/projects
          description: Project management
          operations:
            - name: list-projects
              method: GET
              description: List All Projects
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-project
              method: POST
              description: Create Project
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.id}}"
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"

        - name: environments
          path: /api/admin/environments
          description: Environment management
          operations:
            - name: list-environments
              method: GET
              description: List All Environments
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: users
          path: /api/admin/user-admin
          description: User management
          operations:
            - name: list-users
              method: GET
              description: List All Users
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-user
              method: POST
              description: Create User
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  name: "{{tools.name}}"
                  rootRole: "{{tools.rootRole}}"

        - name: api-tokens
          path: /api/admin/api-tokens
          description: API token management
          operations:
            - name: list-tokens
              method: GET
              description: List All API Tokens
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-token
              method: POST
              description: Create API Token
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  username: "{{tools.username}}"
                  type: "{{tools.type}}"
                  environment: "{{tools.environment}}"
                  project: "{{tools.project}}"

        - name: segments
          path: /api/admin/segments
          description: Segment management
          operations:
            - name: list-segments
              method: GET
              description: List All Segments
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-segment
              method: POST
              description: Create Segment
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  constraints: "{{tools.constraints}}"

        - name: events
          path: /api/admin/events
          description: Event log access
          operations:
            - name: list-events
              method: GET
              description: List All Events
              inputParameters:
                - name: project
                  in: query
                  type: string
                  required: false
                  description: Filter events by project
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Number of events to return
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: unleash-admin-rest
      resources:
        - path: /v1/features
          name: features
          description: Feature flag operations
          operations:
            - method: POST
              name: create-feature
              description: Create a feature flag
              call: "unleash-admin.create-feature"
              with:
                projectId: "rest.projectId"
                name: "rest.name"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/projects
          name: projects
          description: Project listing
          operations:
            - method: GET
              name: list-projects
              description: List all projects
              call: "unleash-admin.list-projects"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: unleash-admin-mcp
      transport: http
      tools:
        - name: list-features
          description: List feature flags in a project
          hints:
            readOnly: true
            openWorld: false
          call: "unleash-admin.list-features"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: enable-feature
          description: Enable a feature flag in an environment
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "unleash-admin.enable-feature"
          with:
            projectId: "tools.projectId"
            featureName: "tools.featureName"
            environment: "tools.environment"
          outputParameters:
            - type: object
              mapping: "$."
