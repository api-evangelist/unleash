naftiko: "1.0.0-alpha1"

info:
  label: Unleash Client API
  description: >-
    Unleash Client API designed for backend services. Returns complete flag configurations
    with all activation strategies for server-side evaluation. Used by Unleash SDKs and
    custom backend integrations.
  tags:
    - Unleash
    - Feature Flags
    - Client
    - SDK
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNLEASH_CLIENT_TOKEN: UNLEASH_CLIENT_TOKEN
      UNLEASH_BASE_URL: UNLEASH_BASE_URL

capability:
  consumes:
    - type: http
      namespace: unleash-client
      baseUri: "{{UNLEASH_BASE_URL}}"
      description: Unleash Client API for server-side flag evaluation
      authentication:
        type: apikey
        key: Authorization
        value: "{{UNLEASH_CLIENT_TOKEN}}"
        placement: header

      resources:
        - name: features
          path: /api/client
          description: Client feature flag endpoints
          operations:
            - name: get-features
              method: GET
              description: Get All Client Features
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: register
              method: POST
              description: Register Client Application
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  appName: "{{tools.appName}}"
                  instanceId: "{{tools.instanceId}}"
                  sdkVersion: "{{tools.sdkVersion}}"
                  strategies: "{{tools.strategies}}"
                  started: "{{tools.started}}"
                  interval: "{{tools.interval}}"

            - name: send-metrics
              method: POST
              description: Send Client Metrics
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  appName: "{{tools.appName}}"
                  instanceId: "{{tools.instanceId}}"
                  bucket: "{{tools.bucket}}"

  exposes:
    - type: rest
      port: 8101
      namespace: unleash-client-rest
      resources:
        - path: /v1/features
          name: features
          operations:
            - method: GET
              name: get-features
              description: Get all client feature flags
              call: "unleash-client.get-features"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: unleash-client-mcp
      transport: http
      tools:
        - name: get-client-features
          description: Get all feature flag configurations for server-side SDK evaluation
          hints:
            readOnly: true
            openWorld: false
          call: "unleash-client.get-features"
          outputParameters:
            - type: object
              mapping: "$."
