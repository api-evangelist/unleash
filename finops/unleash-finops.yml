meters:
  - name: seats
    description: Active named seats on the Unleash subscription
    unit: seat
    aggregation: max
    dimensions:
      - plan
  - name: api_requests_included
    description: API requests counted against the monthly included allowance
    unit: request
    aggregation: sum
    dimensions:
      - api
      - environment
  - name: api_requests_overage
    description: API requests above the included monthly allowance, billed per million
    unit: request
    aggregation: sum
    dimensions:
      - api
      - environment
principles:
  - name: Visibility
    description: Use the Unleash admin UI usage views and exported audit logs (up to 2 years) to track API request volume against the monthly allowance and seat counts.
  - name: Allocation
    description: Allocate cost by Unleash project and environment; tag SDK clients with consumer identifiers and reconcile via project/environment dimensions in the metrics export.
  - name: Optimization
    description: Use SDK-side caching and the Unleash Edge / Frontend API to reduce direct Admin API hits; right-size seats by reviewing inactive users; consider self-hosted or hybrid for high-volume workloads where overage outweighs infrastructure cost.
  - name: Accountability
    description: Assign a feature-flag platform owner who reviews monthly seat changes and request overage charges; alert when monthly request volume approaches the 53M included threshold.
