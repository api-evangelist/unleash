  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Subscription + Usage Overage
  billingFrequency: Monthly (Pay-As-You-Go) / Annual (Enterprise)
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
