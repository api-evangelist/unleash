specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Unleash
providerId: unleash
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Feature Flags
  - Feature Management
  - Developer Tools
  - Rate Limiting
description: Unleash does not publish per-second or per-minute API request rate limits in its public documentation. The commercial constraint is the monthly API request allowance defined in the plan (53M/month on Pay-As-You-Go, custom on Enterprise) with $5/M overage. Self-hosted instances enforce limits set by the operator. Numbers should be sourced from the customer's instance configuration or contract.
sources:
  - https://www.getunleash.io/pricing
  - https://docs.getunleash.io/
notes: No public per-request-rate limits are documented; quota is enforced at the plan level (monthly API request allowance) rather than as request-per-second throttling.
responseCodes:
  throttled: 429
limits:
  - name: Plan-Level Monthly API Requests
    scope: account
    metric: varies
    limit: see plan (53M/month Pay-As-You-Go; custom Enterprise)
    notes: Plan-driven; not a request-rate throttle. Overage billed at $5 per million.
policies:
  - name: Plan-Driven Quota
    description: API consumption is governed by the per-month request allowance attached to the seat-based plan; there is no public per-second rate-limit policy.
  - name: Self-Hosted Operator Discretion
    description: For self-hosted and hybrid deployments, request-rate throttling is configured by the customer at their proxy or Edge layer.
maintainers:
